<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Estoquim API</title>

        <style>
            :root {
                --bg: #f7f8fb;
                --card: #ffffff;
                --text: #1f2937;
                --muted: #4b5563;
                --primary: #2563eb;
                --primary-soft: #eff6ff;
                --border: #d1d5db;
                --success: #16a34a;
                --warning: #f59e0b;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
                color: var(--text);
                min-height: 100vh;
                line-height: 1.6;
            }

            .page {
                max-width: 960px;
                margin: 0 auto;
                padding: 32px 24px;
            }

            .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 18px;
                box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
                padding: 32px;
            }

            header {
                margin-bottom: 28px;
            }

            h1 {
                font-size: clamp(2.2rem, 2.4vw, 3rem);
                margin-bottom: 12px;
            }

            h2 {
                color: #111827;
                margin-top: 32px;
                margin-bottom: 14px;
                font-size: 1.4rem;
            }

            h3 {
                margin-top: 24px;
                margin-bottom: 10px;
                font-size: 1.1rem;
                color: #111827;
            }

            p,
            li {
                color: var(--muted);
            }

            .lead {
                color: #374151;
                margin-bottom: 20px;
                max-width: 720px;
            }

            .endpoint-list {
                list-style: none;
                margin: 0;
                padding: 0;
            }

            .endpoint-item {
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 18px;
                margin-bottom: 16px;
                background: #f8fafc;
            }

            .endpoint-item strong {
                display: inline-block;
                margin-bottom: 8px;
            }

            .endpoint-url {
                display: block;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
                background: #eef2ff;
                color: #1d4ed8;
                padding: 10px 14px;
                border-radius: 10px;
                margin-bottom: 10px;
                overflow-wrap: anywhere;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 6px 12px;
                border-radius: 999px;
                font-size: 0.85rem;
                font-weight: 600;
                background: var(--primary-soft);
                color: var(--primary);
            }

            .note {
                margin-top: 24px;
                padding: 18px;
                background: #eef2ff;
                border-left: 4px solid var(--primary);
                color: #1e3a8a;
                border-radius: 12px;
            }

            .footer {
                margin-top: 32px;
                font-size: 0.95rem;
                color: var(--muted);
            }

            a {
                color: var(--primary);
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            @media (max-width: 640px) {
                .page {
                    padding: 20px 16px;
                }

                .card {
                    padding: 24px;
                }
            }
        </style>
    </head>
    <body>
        <main class="page">
            <div class="card">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </body>
</html>
